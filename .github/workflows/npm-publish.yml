name: node.js package

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish @printdraft/types
        working-directory: packages/types
        run: pnpm publish --access public --no-git-checks

      - name: Publish @printdraft/parser
        working-directory: packages/parser
        run: pnpm publish --access public --no-git-checks

      - name: Publish @printdraft/themes
        working-directory: packages/themes
        run: pnpm publish --access public --no-git-checks

      - name: Publish @printdraft/cli
        working-directory: packages/cli
        run: pnpm publish --access public --no-git-checks

      - name: Publish create-draft
        working-directory: packages/create-draft
        run: pnpm publish --access public --no-git-checks
